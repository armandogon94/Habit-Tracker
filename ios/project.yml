name: HabitTracker

options:
  deploymentTarget:
    iOS: "26.0"
  bundleIdPrefix: com.armandointeligencia
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: "Automatic"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GCC_C_LANGUAGE_STANDARD: gnu17
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    CLANG_ENABLE_OBJC_WEAK: "YES"
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: "YES"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "NO"

targets:
  HabitTracker:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: HabitTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.armandointeligencia.HabitTracker
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Habit Tracker"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    info:
      path: HabitTracker/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

  HabitTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: HabitTrackerTests
    dependencies:
      - target: HabitTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.armandointeligencia.HabitTrackerTests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  HabitTracker:
    build:
      targets:
        HabitTracker: all
        HabitTrackerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HabitTrackerTests
